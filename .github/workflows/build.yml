name: workflows/build.py

on:
  workflow_dispatch:
  schedule:
    - cron: "30 0 * * 5" # Runs every Friday at 6am Sri Lanka Time

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout main
        uses: actions/checkout@v4
        with:
          ref: "main"
          token: "${{ secrets.REPO_DATA_TOKEN }}"
          fetch-depth: 1

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 🛒 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: ⚙️ Run workflows/build.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          export PYTHONPATH="$PYTHONPATH:./src"
          python workflows/build.py

      - name: ⬆️ Push changes
        run: |
          git config --global user.email "${{ secrets.GIT_USER_EMAIL }}"
          git config --global user.name "${{ secrets.GIT_USER_NAME }}"
          git pull origin main

          git add .
          git commit -m "🤖 [build.yml] $(date '+%Y-%m-%d-%H%M')" || echo "No changes to commit"

          git push origin main

      - name: 📄 Prepare GitHub Pages
        run: |
          mkdir -p /tmp/gh-pages
          latest=$(ls -t data/broadsheets/broadsheet.*.html | head -1)
          cp "$latest" /tmp/gh-pages/index.html

      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.REPO_DATA_TOKEN }}
          publish_branch: gh-pages
          publish_dir: /tmp/gh-pages
          force_orphan: true
